spring:
  application:
    name: pigbit
  config:
    import: optional:file:.env.properties

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: ${TZ:America/Sao_Paulo}

  docker:
    compose:
      enabled: false

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2000}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

logging:
  level:
    root: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration-minutes: ${JWT_EXP_MINUTES:1440}

app:
  mail:
    from: ${MAIL_FROM:no-reply@pigbit.local}

cnpj:
  api:
    base-url: ${CNPJ_API_URL:https://receitaws.com.br/v1/cnpj}

nowpayments:
  base-url: ${NOWPAYMENTS_BASE_URL:https://api.nowpayments.io}
  api-key: ${NOWPAYMENTS_API_KEY:}
  ipn-secret: ${NOWPAYMENTS_IPN_SECRET:}

withdrawal:
  alert-threshold-percent: ${WITHDRAWAL_ALERT_THRESHOLD_PERCENT:200}
