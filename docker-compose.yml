services:
  postgres:
    image: postgres:16-alpine
    container_name: pigbit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pigbit
      POSTGRES_PASSWORD: pigbit
      POSTGRES_DB: pigbit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pigbit -d pigbit"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pigbit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pigbit-api
    restart: unless-stopped
    ports:
      - "${APP_PORT:-6000}:6000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 6000
      DATABASE_URL: postgresql://pigbit:pigbit@postgres:5432/pigbit
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NOWPAYMENTS_API_URL: ${NOWPAYMENTS_API_URL:-https://api-sandbox.nowpayments.io/v1}
      NOWPAYMENTS_USE_SANDBOX: ${NOWPAYMENTS_USE_SANDBOX:-true}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
